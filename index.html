<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body class="light-mode">
		<!-- LOADING OVERLAY -->
		<div id="loader-overlay">
			<div class="loader-content">
				<div class="loader-spinner"></div>
				<p class="loader-text">Loading menu…</p>
			</div>
		</div>

		<!-- MAIN CONTENT (hidden until loaded) -->
		<div id="content" style="opacity: 0">
			<div class="bg">
				<button id="toggle-btn" aria-label="Toggle dark mode"></button>
				<article id="menu-header"></article>
			</div>

			<header>
				<div>
					<img class="header-img" src="img/logo.png" alt="" />
					<p>MENU</p>
					<img class="header-img" src="img/logo.png" alt="" />
				</div>
			</header>

			<nav id="category-nav"></nav>

			<main id="main"></main>

			<footer>
				<div id="copy"></div>
				<span class="footer-dot">·</span>
				<div>
					Developed by
					<a href="https://www.ks-solutions-lb.com" target="_blank">KS Solutions</a>
				</div>
			</footer>

			<!-- SCROLL TO TOP -->
			<button id="scroll-top-btn" aria-label="Scroll to top">
				<svg class="progress-ring" viewBox="0 0 44 44">
					<circle class="progress-ring__bg" cx="22" cy="22" r="19" />
					<circle class="progress-ring__fill" cx="22" cy="22" r="19" />
				</svg>
				<span class="arrow-icon">
					<svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z" /></svg>
				</span>
			</button>

			<!-- ORDER BUTTON (floating) -->
			<button id="order-fab" aria-label="Build your order">
				<svg viewBox="0 0 24 24" width="20" height="20">
					<path
						d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.86-7.01L19.42 4h-.01l-1.1 2-2.76 5H8.53l-.13-.27L6.16 6l-.95-2-.94-2H1v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25z"
					/>
				</svg>
				<span id="order-fab-badge" class="order-badge hidden">0</span>
			</button>

			<!-- ORDER PANEL (slide-up) -->
			<div id="order-panel" class="order-panel hidden">
				<div class="order-panel-header">
					<h2>Your Order</h2>
					<div class="order-panel-header-actions">
						<button id="order-clear-btn" class="order-clear-btn hidden" aria-label="Clear cart">Clear</button>
						<button id="order-panel-close" aria-label="Close">&times;</button>
					</div>
				</div>
				<div id="order-panel-body" class="order-panel-body">
					<p class="order-empty">Tap any item on the menu to add it to your order.</p>
				</div>
				<div class="order-panel-footer">
					<div class="order-total">
						Total:
						<strong id="order-total-value">0$</strong>
					</div>
					<button id="order-confirm-btn" class="order-confirm-btn" disabled>Send via WhatsApp</button>
				</div>
			</div>

			<!-- ORDER BACKDROP -->
			<div id="order-backdrop" class="order-backdrop hidden"></div>

			<!-- QTY POPUP -->
			<div id="qty-popup" class="qty-popup hidden">
				<div class="qty-popup-card">
					<div class="qty-popup-title" id="qty-popup-title">Item</div>
					<div class="qty-popup-price" id="qty-popup-price"></div>
					<div class="qty-popup-controls">
						<button id="qty-pop-minus" class="qty-pop-btn" aria-label="Decrease">−</button>
						<input id="qty-pop-input" class="qty-pop-input" type="number" min="0" step="0.5" value="1" inputmode="decimal" />
						<button id="qty-pop-plus" class="qty-pop-btn" aria-label="Increase">+</button>
					</div>
					<div class="qty-popup-actions">
						<button id="qty-pop-cancel" class="qty-pop-action cancel">Cancel</button>
						<button id="qty-pop-remove" class="qty-pop-action remove hidden">Remove</button>
						<button id="qty-pop-add" class="qty-pop-action add">Add to Order</button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://menus.blob.core.windows.net/shared/utils/logs.js"></script>
		<script src="./js/data.js"></script>
		<script src="./js/svg.js"></script>
		<script src="./js/script.js"></script>
	</body>
</html>
